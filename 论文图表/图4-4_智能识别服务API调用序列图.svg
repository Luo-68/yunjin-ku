<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- 标题 -->
  <text x="450" y="25" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">智能识别服务API调用序列图</text>
  <text x="450" y="45" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#718096">用户上传图片 → 系统识别 → 返回结果</text>
  
  <!-- 参与者 -->
  <!-- 用户 -->
  <rect x="60" y="60" width="80" height="35" rx="5" fill="#667eea" filter="url(#shadow)"/>
  <text x="100" y="82" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">用户</text>
  <line x1="100" y1="95" x2="100" y2="560" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 前端 -->
  <rect x="200" y="60" width="100" height="35" rx="5" fill="#10b981" filter="url(#shadow)"/>
  <text x="250" y="82" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">React前端</text>
  <line x1="250" y1="95" x2="250" y2="560" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Node.js后端 -->
  <rect x="360" y="60" width="100" height="35" rx="5" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="410" y="82" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">Node.js后端</text>
  <line x1="410" y1="95" x2="410" y2="560" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- AI服务 -->
  <rect x="520" y="60" width="100" height="35" rx="5" fill="#ef4444" filter="url(#shadow)"/>
  <text x="570" y="82" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">Flask AI服务</text>
  <line x1="570" y1="95" x2="570" y2="560" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- YOLOv8模型 -->
  <rect x="680" y="60" width="100" height="35" rx="5" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="730" y="82" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">YOLOv8模型</text>
  <line x1="730" y1="95" x2="730" y2="560" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- MongoDB -->
  <rect x="820" y="60" width="60" height="35" rx="5" fill="#047857" filter="url(#shadow)"/>
  <text x="850" y="82" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="white">MongoDB</text>
  <line x1="850" y1="95" x2="850" y2="560" stroke="#047857" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 序列消息 -->
  
  <!-- 1. 上传图片 -->
  <line x1="100" y1="120" x2="250" y2="120" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="130" y="105" width="80" height="20" rx="3" fill="#edf2f7"/>
  <text x="170" y="118" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#4a5568">选择图片上传</text>
  
  <!-- 2. 图片预览 -->
  <line x1="250" y1="145" x2="100" y2="145" stroke="#718096" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <rect x="140" y="132" width="60" height="18" rx="3" fill="#f1f5f9"/>
  <text x="170" y="144" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#718096">图片预览</text>
  
  <!-- 3. 发送识别请求 -->
  <line x1="250" y1="170" x2="410" y2="170" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="157" width="90" height="18" rx="3" fill="#fef3c7"/>
  <text x="325" y="169" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#92400e">POST /api/recognize</text>
  
  <!-- 4. 验证Token -->
  <rect x="380" y="190" width="60" height="25" rx="3" fill="#fef9c3"/>
  <text x="410" y="207" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#854d0e">JWT验证</text>
  
  <!-- 5. 保存图片 -->
  <line x1="410" y1="230" x2="850" y2="230" stroke="#2d3748" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="218" width="70" height="16" rx="3" fill="#d1fae5"/>
  <text x="615" y="229" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#065f46">保存图片记录</text>
  
  <!-- 6. 调用AI服务 -->
  <line x1="410" y1="260" x2="570" y2="260" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="450" y="248" width="70" height="16" rx="3" fill="#fee2e2"/>
  <text x="485" y="259" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#991b1b">POST /predict</text>
  
  <!-- 7. 图像预处理 -->
  <rect x="540" y="280" width="60" height="25" rx="3" fill="#fee2e2"/>
  <text x="570" y="297" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#991b1b">图像预处理</text>
  
  <!-- 8. 模型推理 -->
  <line x1="570" y1="320" x2="730" y2="320" stroke="#2d3748" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="610" y="308" width="60" height="16" rx="3" fill="#ede9fe"/>
  <text x="640" y="319" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5b21b6">模型推理</text>
  
  <!-- 9. 返回识别结果 -->
  <line x1="730" y1="350" x2="570" y2="350" stroke="#718096" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <rect x="600" y="338" width="80" height="16" rx="3" fill="#ede9fe"/>
  <text x="640" y="349" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5b21b6">返回检测结果</text>
  
  <!-- 10. NMS后处理 -->
  <rect x="540" y="370" width="60" height="25" rx="3" fill="#fee2e2"/>
  <text x="570" y="387" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#991b1b">NMS后处理</text>
  
  <!-- 11. 返回识别结果给后端 -->
  <line x1="570" y1="410" x2="410" y2="410" stroke="#718096" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <rect x="445" y="398" width="70" height="16" rx="3" fill="#fee2e2"/>
  <text x="480" y="409" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#991b1b">识别结果JSON</text>
  
  <!-- 12. 保存识别记录 -->
  <line x1="410" y1="440" x2="850" y2="440" stroke="#2d3748" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="580" y="428" width="70" height="16" rx="3" fill="#d1fae5"/>
  <text x="615" y="439" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#065f46">保存识别记录</text>
  
  <!-- 13. 返回结果给前端 -->
  <line x1="410" y1="470" x2="250" y2="470" stroke="#718096" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <rect x="280" y="458" width="90" height="16" rx="3" fill="#fef3c7"/>
  <text x="325" y="469" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#92400e">返回识别结果</text>
  
  <!-- 14. 展示结果 -->
  <line x1="250" y1="500" x2="100" y2="500" stroke="#718096" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <rect x="130" y="488" width="80" height="16" rx="3" fill="#d1fae5"/>
  <text x="170" y="499" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#065f46">显示识别结果</text>
  
  <!-- 结果详情框 -->
  <rect x="250" y="520" width="200" height="70" rx="5" fill="white" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="350" y="540" font-family="Microsoft YaHei, Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="#2d3748">识别结果示例</text>
  <text x="260" y="558" font-family="Arial" font-size="8" fill="#718096">{"ethnicity": "苗族",</text>
  <text x="260" y="572" font-family="Arial" font-size="8" fill="#718096">"confidence": 0.945,</text>
  <text x="260" y="586" font-family="Arial" font-size="8" fill="#718096">"description": "苗族服饰特点..."}</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
  
  <!-- 时间轴标注 -->
  <rect x="60" y="560" width="820" height="35" rx="5" fill="#f1f5f9"/>
  <text x="80" y="580" font-family="Microsoft YaHei, Arial" font-size="9" fill="#4a5568">⏱ 响应时间: 总计约850ms | 图片上传: 150ms | AI推理: 600ms | 结果处理: 100ms</text>
  
  <!-- 端口说明 -->
  <text x="500" y="580" font-family="Microsoft YaHei, Arial" font-size="9" fill="#718096">API端口: Node.js:3001 | Flask AI:5000</text>
</svg>
