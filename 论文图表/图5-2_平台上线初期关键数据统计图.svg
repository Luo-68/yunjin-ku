<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="520" fill="#fafbfc"/>
  
  <!-- 标题 -->
  <text x="450" y="25" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">平台上线初期关键数据统计图</text>
  <text x="450" y="45" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#7f8c8d">统计周期：2025年1月 - 2025年3月</text>
  
  <!-- 左侧柱状图 -->
  <rect x="30" y="60" width="400" height="270" rx="10" fill="white" stroke="#e0e0e0" filter="url(#shadow)"/>
  <text x="230" y="85" font-family="Microsoft YaHei, Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">核心数据指标</text>
  
  <!-- Y轴 -->
  <line x1="70" y1="100" x2="70" y2="300" stroke="#bdc3c7" stroke-width="1"/>
  <!-- X轴 -->
  <line x1="70" y1="300" x2="400" y2="300" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Y轴刻度 -->
  <text x="60" y="105" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">5000</text>
  <text x="60" y="155" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">4000</text>
  <text x="60" y="205" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">3000</text>
  <text x="60" y="255" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">2000</text>
  <text x="60" y="305" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">1000</text>
  
  <!-- 网格线 -->
  <line x1="70" y1="100" x2="400" y2="100" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="70" y1="150" x2="400" y2="150" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="70" y1="200" x2="400" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="70" y1="250" x2="400" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- 柱状图 -->
  <!-- 累计访问用户数 -->
  <rect x="95" y="128" width="50" height="172" rx="3" fill="url(#barGrad1)" filter="url(#shadow)"/>
  <text x="120" y="318" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5d6d7e">累计访问</text>
  <text x="120" y="330" font-family="Arial" font-size="8" text-anchor="middle" fill="#7f8c8d">(UV)</text>
  <text x="120" y="120" font-family="Arial" font-size="9" text-anchor="middle" fill="#3498db" font-weight="bold">4,280</text>
  
  <!-- 图片识别调用次数 -->
  <rect x="165" y="150" width="50" height="150" rx="3" fill="url(#barGrad2)" filter="url(#shadow)"/>
  <text x="190" y="318" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5d6d7e">识别调用</text>
  <text x="190" y="330" font-family="Arial" font-size="8" text-anchor="middle" fill="#7f8c8d">(次)</text>
  <text x="190" y="142" font-family="Arial" font-size="9" text-anchor="middle" fill="#2ecc71" font-weight="bold">3,650</text>
  
  <!-- 用户生成内容数量 -->
  <rect x="235" y="225" width="50" height="75" rx="3" fill="url(#barGrad3)" filter="url(#shadow)"/>
  <text x="260" y="318" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5d6d7e">UGC内容</text>
  <text x="260" y="330" font-family="Arial" font-size="8" text-anchor="middle" fill="#7f8c8d">(条)</text>
  <text x="260" y="217" font-family="Arial" font-size="9" text-anchor="middle" fill="#e74c3c" font-weight="bold">1,520</text>
  
  <!-- 注册用户数 -->
  <rect x="305" y="265" width="50" height="35" rx="3" fill="url(#barGrad4)" filter="url(#shadow)"/>
  <text x="330" y="318" font-family="Microsoft YaHei, Arial" font-size="8" text-anchor="middle" fill="#5d6d7e">注册用户</text>
  <text x="330" y="330" font-family="Arial" font-size="8" text-anchor="middle" fill="#7f8c8d">(人)</text>
  <text x="330" y="257" font-family="Arial" font-size="9" text-anchor="middle" fill="#9b59b6" font-weight="bold">856</text>
  
  <!-- 右侧折线图 -->
  <rect x="450" y="60" width="420" height="270" rx="10" fill="white" stroke="#e0e0e0" filter="url(#shadow)"/>
  <text x="660" y="85" font-family="Microsoft YaHei, Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">月度趋势变化</text>
  
  <!-- Y轴 -->
  <line x1="490" y1="100" x2="490" y2="300" stroke="#bdc3c7" stroke-width="1"/>
  <!-- X轴 -->
  <line x1="490" y1="300" x2="840" y2="300" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Y轴刻度 -->
  <text x="480" y="105" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">2000</text>
  <text x="480" y="155" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">1500</text>
  <text x="480" y="205" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">1000</text>
  <text x="480" y="255" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">500</text>
  <text x="480" y="305" font-family="Arial" font-size="9" text-anchor="end" fill="#7f8c8d">0</text>
  
  <!-- X轴标签 -->
  <text x="550" y="315" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">1月</text>
  <text x="620" y="315" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">2月</text>
  <text x="690" y="315" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">3月</text>
  <text x="760" y="315" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">4月</text>
  <text x="830" y="315" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">5月</text>
  
  <!-- 网格线 -->
  <line x1="490" y1="150" x2="840" y2="150" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="490" y1="200" x2="840" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="490" y1="250" x2="840" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- 访问用户折线 -->
  <polyline points="550,280 620,240 690,180 760,140 830,110" 
            stroke="#3498db" stroke-width="2.5" fill="none"/>
  <circle cx="550" cy="280" r="4" fill="#3498db"/>
  <circle cx="620" cy="240" r="4" fill="#3498db"/>
  <circle cx="690" cy="180" r="4" fill="#3498db"/>
  <circle cx="760" cy="140" r="4" fill="#3498db"/>
  <circle cx="830" cy="110" r="4" fill="#3498db"/>
  
  <!-- 识别调用折线 -->
  <polyline points="550,285 620,255 690,200 760,160 830,130" 
            stroke="#2ecc71" stroke-width="2.5" fill="none"/>
  <circle cx="550" cy="285" r="3" fill="#2ecc71"/>
  <circle cx="620" cy="255" r="3" fill="#2ecc71"/>
  <circle cx="690" cy="200" r="3" fill="#2ecc71"/>
  <circle cx="760" cy="160" r="3" fill="#2ecc71"/>
  <circle cx="830" cy="130" r="3" fill="#2ecc71"/>
  
  <!-- UGC折线 -->
  <polyline points="550,295 620,280 690,250 760,220 830,190" 
            stroke="#e74c3c" stroke-width="2.5" fill="none"/>
  <circle cx="550" cy="295" r="3" fill="#e74c3c"/>
  <circle cx="620" cy="280" r="3" fill="#e74c3c"/>
  <circle cx="690" cy="250" r="3" fill="#e74c3c"/>
  <circle cx="760" cy="220" r="3" fill="#e74c3c"/>
  <circle cx="830" cy="190" r="3" fill="#e74c3c"/>
  
  <!-- 图例 -->
  <rect x="520" y="325" width="280" height="25" rx="3" fill="#f8f9fa"/>
  <line x1="530" y1="337" x2="550" y2="337" stroke="#3498db" stroke-width="2"/>
  <circle cx="540" cy="337" r="3" fill="#3498db"/>
  <text x="555" y="341" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">访问用户</text>
  
  <line x1="620" y1="337" x2="640" y2="337" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="630" cy="337" r="3" fill="#2ecc71"/>
  <text x="645" y="341" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">识别调用</text>
  
  <line x1="710" y1="337" x2="730" y2="337" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="720" cy="337" r="3" fill="#e74c3c"/>
  <text x="735" y="341" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">UGC内容</text>
  
  <!-- 底部统计卡片 -->
  <rect x="30" y="350" width="840" height="150" rx="10" fill="white" stroke="#e0e0e0" filter="url(#shadow)"/>
  <text x="50" y="375" font-family="Microsoft YaHei, Arial" font-size="11" font-weight="bold" fill="#2c3e50">关键指标详情</text>
  
  <!-- 统计卡片1 -->
  <rect x="50" y="390" width="150" height="90" rx="8" fill="#e8f4fd"/>
  <text x="125" y="415" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#3498db">日均访问量</text>
  <text x="125" y="450" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#2980b9">142</text>
  <text x="125" y="470" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">人次/天</text>
  
  <!-- 统计卡片2 -->
  <rect x="220" y="390" width="150" height="90" rx="8" fill="#e8f8f5"/>
  <text x="295" y="415" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#2ecc71">识别成功率</text>
  <text x="295" y="450" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#27ae60">91.8%</text>
  <text x="295" y="470" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">平均置信度</text>
  
  <!-- 统计卡片3 -->
  <rect x="390" y="390" width="150" height="90" rx="8" fill="#fef5e7"/>
  <text x="465" y="415" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#f39c12">用户留存率</text>
  <text x="465" y="450" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#e67e22">68.5%</text>
  <text x="465" y="470" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">7日留存</text>
  
  <!-- 统计卡片4 -->
  <rect x="560" y="390" width="150" height="90" rx="8" fill="#f5eef8"/>
  <text x="635" y="415" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#9b59b6">人均互动</text>
  <text x="635" y="450" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#8e44ad">4.2</text>
  <text x="635" y="470" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">次/用户</text>
  
  <!-- 统计卡片5 -->
  <rect x="730" y="390" width="120" height="90" rx="8" fill="#fdedec"/>
  <text x="790" y="415" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="#e74c3c">内容转化率</text>
  <text x="790" y="450" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#c0392b">35.6%</text>
  <text x="790" y="470" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">访客发帖比</text>
</svg>