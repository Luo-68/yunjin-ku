<?xml version="1.0" encoding="UTF-8"?>
<svg width="850" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="850" height="600" fill="#fafbfc"/>
  
  <!-- 标题 -->
  <text x="425" y="25" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">用户发布帖子业务逻辑流程图</text>
  
  <!-- 开始 -->
  <ellipse cx="425" cy="60" rx="45" ry="22" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="425" y="65" font-family="Microsoft YaHei, Arial" font-size="11" text-anchor="middle" fill="white">开始</text>
  
  <!-- 箭头 -->
  <line x1="425" y1="82" x2="425" y2="100" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 点击发布按钮 -->
  <rect x="325" y="105" width="200" height="35" rx="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="425" y="127" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">用户点击"发布"按钮</text>
  
  <line x1="425" y1="140" x2="425" y2="158" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 检查登录状态 -->
  <polygon points="425,163 505,195 425,227 345,195" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="425" y="198" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">已登录?</text>
  
  <!-- 否：跳转登录 -->
  <line x1="505" y1="195" x2="620" y2="195" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="185" font-family="Microsoft YaHei, Arial" font-size="9" fill="#e74c3c">否</text>
  
  <rect x="630" y="177" width="100" height="36" rx="5" fill="#ecf0f1" stroke="#bdc3c7" filter="url(#shadow)"/>
  <text x="680" y="200" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#5d6d7e">跳转登录页面</text>
  
  <!-- 是：继续 -->
  <line x1="425" y1="227" x2="425" y2="245" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="438" y="240" font-family="Microsoft YaHei, Arial" font-size="9" fill="#27ae60">是</text>
  
  <!-- 填写帖子内容 -->
  <rect x="325" y="250" width="200" height="35" rx="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="425" y="272" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">填写描述、上传图片/视频</text>
  
  <line x1="425" y1="285" x2="425" y2="303" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 选择标签 -->
  <rect x="325" y="308" width="200" height="35" rx="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="425" y="330" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">添加标签和话题</text>
  
  <line x1="425" y1="343" x2="425" y2="361" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 提交表单 -->
  <rect x="325" y="366" width="200" height="35" rx="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="425" y="388" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">前端提交表单数据</text>
  
  <line x1="425" y1="401" x2="425" y2="419" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 后端验证 -->
  <polygon points="425,424 505,456 425,488 345,456" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="425" y="452" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="white">数据验证</text>
  <text x="425" y="465" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="white">通过?</text>
  
  <!-- 否：返回错误 -->
  <line x1="345" y1="456" x2="200" y2="456" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="446" font-family="Microsoft YaHei, Arial" font-size="9" fill="#e74c3c">否</text>
  
  <rect x="90" y="438" width="110" height="36" rx="5" fill="#ecf0f1" stroke="#e74c3c" filter="url(#shadow)"/>
  <text x="145" y="461" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="#e74c3c">返回错误信息</text>
  
  <!-- 是：继续处理 -->
  <line x1="425" y1="488" x2="425" y2="500" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="438" y="497" font-family="Microsoft YaHei, Arial" font-size="9" fill="#27ae60">是</text>
  
  <!-- 保存帖子 -->
  <rect x="325" y="505" width="200" height="30" rx="5" fill="url(#dataGrad)" filter="url(#shadow)"/>
  <text x="425" y="525" font-family="Microsoft YaHei, Arial" font-size="10" text-anchor="middle" fill="white">保存帖子 → MongoDB</text>
  
  <line x1="525" y1="520" x2="580" y2="520" stroke="#5d6d7e" stroke-width="1.5"/>
  <line x1="580" y1="520" x2="580" y2="456" stroke="#5d6d7e" stroke-width="1.5"/>
  <line x1="580" y1="456" x2="650" y2="456" stroke="#5d6d7e" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 更新Feed流 -->
  <rect x="660" y="438" width="100" height="36" rx="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="710" y="461" font-family="Microsoft YaHei, Arial" font-size="9" text-anchor="middle" fill="white">更新Feed流</text>
  
  <!-- 返回成功 -->
  <line x1="425" y1="535" x2="425" y2="550" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- 结束 -->
  <ellipse cx="425" cy="572" rx="45" ry="20" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="425" y="577" font-family="Microsoft YaHei, Arial" font-size="11" text-anchor="middle" fill="white">发布成功</text>
  
  <!-- 图例 -->
  <rect x="40" y="80" width="120" height="120" rx="5" fill="white" stroke="#e0e0e0" filter="url(#shadow)"/>
  <text x="100" y="98" font-family="Microsoft YaHei, Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#2c3e50">图例</text>
  
  <ellipse cx="60" cy="115" rx="18" ry="9" fill="url(#startGrad)"/>
  <text x="95" y="119" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">开始/结束</text>
  
  <rect x="45" y="130" width="30" height="14" rx="3" fill="url(#processGrad)"/>
  <text x="95" y="142" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">处理步骤</text>
  
  <polygon points="60,162 72,170 60,178 48,170" fill="url(#decisionGrad)"/>
  <text x="95" y="174" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">判断条件</text>
  
  <rect x="45" y="185" width="30" height="14" rx="3" fill="url(#dataGrad)"/>
  <text x="95" y="196" font-family="Microsoft YaHei, Arial" font-size="8" fill="#5d6d7e">数据库操作</text>
</svg>